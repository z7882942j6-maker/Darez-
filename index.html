<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="DAREZ"/>
<title>DAREZ ⚡</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#1E1B2E;font-family:'Nunito',sans-serif;overscroll-behavior:none}
body{display:flex;justify-content:center}
#app{width:100%;max-width:430px;height:100%;display:flex;flex-direction:column;overflow:hidden;background:#F1F5F9;position:relative}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
.screen.active{display:block}
.ff{font-family:'Fredoka One',sans-serif}
.pk{color:#FF6B00}.pu{color:#C084FC}.yw{color:#FBBF24}.gn{color:#34D399}.mu{color:#94A3B8}.ink{color:#1E1B2E}
.btn-main{width:100%;padding:16px;border-radius:999px;background:linear-gradient(135deg,#FF6B00,#C084FC);border:none;font-family:'Fredoka One',sans-serif;font-size:20px;color:#fff;cursor:pointer;letter-spacing:1px}
.card{background:#fff;border-radius:20px;box-shadow:0 2px 12px rgba(0,0,0,.07)}
nav{display:flex;background:#fff;border-top:1px solid rgba(0,0,0,.08);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;border:none;background:none;cursor:pointer}
.nb .ni{font-size:22px;transition:transform .15s}
.nb .nl{font-size:9px;font-weight:800;color:#94A3B8;letter-spacing:.3px}
.nb.active .ni{transform:scale(1.2)}
.nb.active .nl{color:#FF6B00}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes barFill{from{width:0%}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.fade{animation:fadeUp .3s ease-out both}
/* SPLASH */
#splash{position:fixed;inset:0;background:linear-gradient(160deg,#1E1B2E,#2D1B5E);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
#splash-logo{font-family:'Fredoka One',sans-serif;font-size:80px;background:linear-gradient(135deg,#FF6B00,#C084FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#splash-sub{font-weight:900;font-size:11px;color:rgba(255,255,255,.35);letter-spacing:3px;margin-top:8px}
#splash-bar-wrap{width:48px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:48px;overflow:hidden}
#splash-bar{height:100%;width:0;background:linear-gradient(90deg,#FF6B00,#C084FC);border-radius:2px;transition:width .1s}
/* NOTIF */
#notif{position:fixed;top:60px;left:50%;transform:translateX(-50%);border-radius:999px;padding:10px 20px;display:flex;align-items:center;gap:8px;z-index:800;box-shadow:0 6px 24px rgba(0,0,0,.3);white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none}
#notif.show{opacity:1}
/* HERO */
.hero{background:linear-gradient(160deg,#1E1B2E,#2D1B5E);border-radius:0 0 32px 32px;padding:20px 18px 18px;position:relative;overflow:hidden}
.hero-orb{position:absolute;border-radius:50%;filter:blur(40px);pointer-events:none}
/* ONBOARDING */
#ob{position:fixed;inset:0;background:linear-gradient(160deg,#1E1B2E,#2D1B5E);z-index:5000;display:flex;flex-direction:column;align-items:center;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);overflow:hidden}
.ob-step{display:none;flex-direction:column;align-items:center;flex:1;padding:20px 24px 40px;width:100%;overflow-y:auto}
.ob-step.active{display:flex}
.ob-input{width:100%;padding:16px 20px;border-radius:16px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-family:'Fredoka One',sans-serif;font-size:20px;text-align:center;outline:none;letter-spacing:1px}
.av-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;margin-bottom:20px}
.av-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 6px;border-radius:16px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.av-item.sel{border-color:#FF6B00;background:rgba(255,107,0,.1)}
/* CHALLENGE */
#ch-screen{position:fixed;inset:0;z-index:4000;display:none;flex-direction:column}
#ch-screen.active{display:flex}
</style>
</head>
<body>
<div id="app">
  <!-- SPLASH -->
  <div id="splash">
    <div id="splash-logo">DAREZ</div>
    <div id="splash-sub">CHARGEMENT...</div>
    <div id="splash-bar-wrap"><div id="splash-bar"></div></div>
  </div>

  <!-- NOTIF -->

  <div id="notif"><span id="notif-icon"></span><div><div id="notif-text" style="font-family:'Fredoka One',sans-serif;font-size:15px;color:#fff"></div><div id="notif-sub" style="font-size:10px;font-weight:800;color:rgba(255,255,255,.75)"></div></div></div>

  <!-- ONBOARDING -->

  <div id="ob">
    <div style="padding:22px 22px 0;display:flex;justify-content:center;gap:8px;width:100%">
      <div class="dot" style="width:24px;height:8px;border-radius:4px;background:#FF6B00;transition:all .2s"></div>
      <div class="dot" style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);transition:all .2s"></div>
      <div class="dot" style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);transition:all .2s"></div>
    </div>
    <!-- Step 0: Lang -->
    <div class="ob-step active" id="ob0">
      <div style="font-family:'Fredoka One',sans-serif;font-size:68px;background:linear-gradient(135deg,#FF6B00,#C084FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:6px">DAREZ</div>
      <div style="font-size:12px;font-weight:800;color:rgba(255,255,255,.5);letter-spacing:2px;margin-bottom:32px">THE GLOBAL FLASH CHALLENGE</div>
      <p style="font-size:13px;font-weight:800;color:rgba(255,255,255,.6);margin-bottom:14px">Choisis ta langue</p>
      <div style="width:100%;display:flex;flex-direction:column;gap:8px;margin-bottom:28px">
        <div class="lang-opt" data-lang="fr" style="display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:16px;background:rgba(255,107,0,.2);border:2px solid #FF6B00;cursor:pointer">
          <span style="font-size:24px">🇫🇷</span><span style="font-family:'Fredoka One',sans-serif;font-size:18px;color:#FF6B00">Français</span><span style="margin-left:auto;color:#FF6B00">✓</span>
        </div>
        <div class="lang-opt" data-lang="en" style="display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:16px;background:rgba(255,255,255,.08);border:2px solid transparent;cursor:pointer">
          <span style="font-size:24px">🇬🇧</span><span style="font-family:'Fredoka One',sans-serif;font-size:18px;color:rgba(255,255,255,.8)">English</span>
        </div>
      </div>
      <button class="btn-main" onclick="obNext()">SUIVANT →</button>
    </div>
    <!-- Step 1: Name -->
    <div class="ob-step" id="ob1">
      <div style="font-size:64px;margin-bottom:14px">👤</div>
      <div style="font-family:'Fredoka One',sans-serif;font-size:28px;color:#fff;margin-bottom:20px">Ton pseudo</div>
      <input class="ob-input" id="ob-name" placeholder="Ex: CHAOS_KID" maxlength="20" style="margin-bottom:6px"/>
      <p style="font-size:11px;font-weight:700;color:rgba(255,255,255,.4);margin-bottom:auto">Max 20 caractères</p>
      <button class="btn-main" style="margin-top:20px" onclick="obNext()">SUIVANT →</button>
    </div>
    <!-- Step 2: Avatar -->
    <div class="ob-step" id="ob2">
      <div id="ob-av-preview" style="margin-bottom:12px"></div>
      <div style="font-family:'Fredoka One',sans-serif;font-size:28px;color:#fff;margin-bottom:16px">Choisis ton perso</div>
      <div class="av-grid" id="ob-av-grid"></div>
      <button class="btn-main" onclick="obFinish()">C'EST PARTI ⚡</button>
    </div>
  </div>

  <!-- CHALLENGE SCREEN -->

  <div id="ch-screen">
    <div id="ch-content" style="flex:1;display:flex;flex-direction:column"></div>
  </div>

  <!-- HOME SCREEN -->

  <div class="screen active" id="screen-home"></div>
  <!-- LEAGUES SCREEN -->
  <div class="screen" id="screen-leagues"></div>
  <!-- GLOBAL SCREEN -->
  <div class="screen" id="screen-global"></div>
  <!-- SHOP SCREEN -->
  <div class="screen" id="screen-shop"></div>
  <!-- PROFILE SCREEN -->
  <div class="screen" id="screen-profile"></div>

  <!-- NAV -->

  <nav id="main-nav">
    <button class="nb active" data-tab="home"><span class="ni">🏠</span><span class="nl">Accueil</span></button>
    <button class="nb" data-tab="leagues"><span class="ni">⚔️</span><span class="nl">Ligues</span></button>
    <button class="nb" data-tab="flash" style="position:relative"><span class="ni" style="filter:drop-shadow(0 0 6px #FBBF24)">⚡</span><span class="nl" style="color:#FBBF24">Flash</span></button>
    <button class="nb" data-tab="global"><span class="ni">🌍</span><span class="nl">Global</span></button>
    <button class="nb" data-tab="profile"><span class="ni">👤</span><span class="nl">Profil</span></button>
  </nav>
</div>

<script>
'use strict';

// ── DATA ──────────────────────────────────────────────────────
var RANKS=[
  {id:'rookie',label:'ROOKIE',icon:'🌱',color:'#94A3B8',g1:'#334155',g2:'#1E293B',min:0,max:1000},
  {id:'riser',label:'RISER',icon:'⚡',color:'#22D3EE',g1:'#0891B2',g2:'#0E7490',min:1000,max:3000},
  {id:'spark',label:'SPARK',icon:'🔥',color:'#F59E0B',g1:'#D97706',g2:'#B45309',min:3000,max:7000},
  {id:'blaze',label:'BLAZE',icon:'💥',color:'#F97316',g1:'#EA580C',g2:'#C2410C',min:7000,max:15000},
  {id:'phantom',label:'PHANTOM',icon:'👻',color:'#A855F7',g1:'#9333EA',g2:'#7E22CE',min:15000,max:30000},
  {id:'god',label:'DAREZ GOD',icon:'👑',color:'#FFD700',g1:'#F59E0B',g2:'#D97706',min:30000,max:999999}
];
var CHALLENGES=[
  {id:1,emoji:'😱',timer:45,xp:120,text:'Fais ta tête la plus terrifiante'},
  {id:2,emoji:'⚡',timer:30,xp:150,text:'Pose de super-héros qui atterrit'},
  {id:3,emoji:'🔴',timer:25,xp:100,text:'Trouve quelque chose de rouge'},
  {id:4,emoji:'🎤',timer:20,xp:180,text:'Beatboxe pendant 15 secondes'},
  {id:5,emoji:'🕺',timer:30,xp:160,text:'Montre ton mouvement de danse'},
  {id:6,emoji:'🤯',timer:12,xp:250,text:'Explique la physique quantique en 10s'},
  {id:7,emoji:'🎭',timer:30,xp:200,text:'Pleure comme si tu as perdu la Coupe du Monde'}
];
var PLAYERS=[
  {id:'p1',name:'zara_flash 🇧🇷',av:'😈',xp:8420,score:9200,streak:12},
  {id:'p2',name:'drift.exe 🇯🇵',av:'🥷',xp:7100,score:8750,streak:7},
  {id:'p3',name:'neon_leo 🇫🇷',av:'🦊',xp:6300,score:8100,streak:5},
  {id:'p4',name:'sky.wav 🇺🇸',av:'⚡',xp:5800,score:7600,streak:3},
  {id:'p5',name:'luna_riot 🇪🇸',av:'🌸',xp:4200,score:6900,streak:9}
];
var LEAGUES=[
  {id:'l1',name:'CHAOS CREW',badge:'💥',color:'#FF6B00',members:847,rank:1,joined:true},
  {id:'l2',name:'SHADOW GUILD',badge:'👻',color:'#A855F7',members:623,rank:2,joined:true},
  {id:'l3',name:'BLAZE SQUAD',badge:'🔥',color:'#F97316',members:512,rank:3,joined:false},
  {id:'l4',name:'CRYSTAL TEAM',badge:'💎',color:'#22D3EE',members:389,rank:4,joined:false}
];
var AVS=[
  {id:'ninja',name:'Ninja',bg:'#1A1A2E',skin:'#FFCBA4',ec:'#FF3366'},
  {id:'blaze',name:'Blaze',bg:'#FF5722',skin:'#FFCBA4',ec:'#FFE600'},
  {id:'sakura',name:'Sakura',bg:'#FCE4EC',skin:'#FFE4E8',ec:'#E91E63'},
  {id:'wolf',name:'Wolf',bg:'#4A4E69',skin:'#CFD0D4',ec:'#FFB300'},
  {id:'thunder',name:'Thunder',bg:'#FFF176',skin:'#FFCBA4',ec:'#1565C0'},
  {id:'shadow',name:'Shadow',bg:'#311B92',skin:'#B39DDB',ec:'#CE93D8'},
  {id:'fox',name:'Fox',bg:'#E64A19',skin:'#FFD4A3',ec:'#FF6D00'},
  {id:'panda',name:'Panda',bg:'#F5F5F5',skin:'#FFFFFF',ec:'#212121'},
  {id:'dragon',name:'Dragon',bg:'#00BFA5',skin:'#A7FFEB',ec:'#FF6D00'},
  {id:'robot',name:'Bot',bg:'#546E7A',skin:'#CFD8DC',ec:'#00E5FF'},
  {id:'angel',name:'Angel',bg:'#FFFDE7',skin:'#FFE4C4',ec:'#81D4FA'},
  {id:'galaxy',name:'Galaxy',bg:'#0A0A2A',skin:'#CE93D8',ec:'#EA80FC'}
];
var ME={xp:15800,coins:680,score:8340};

// ── STATE ──────────────────────────────────────────────────────
var state={
  lang: localStorage.getItem('dz_lang')||'fr',
  userName: localStorage.getItem('dz_name')||'PLAYER',
  avId: localStorage.getItem('dz_av')||'sakura',
  streak: 9,
  onboarded: !!localStorage.getItem('dz_done'),
  currentTab: 'home'
};

function getRank(xp){for(var i=RANKS.length-1;i>=0;i--){if(xp>=RANKS[i].min)return RANKS[i];}return RANKS[0];}
function getAv(id){for(var i=0;i<AVS.length;i++){if(AVS[i].id===id)return AVS[i];}return AVS[0];}

// ── AVATAR SVG ─────────────────────────────────────────────────
function avSVG(av,size){
  var s=size||52,cx=s/2;
  return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 '+s+' '+s+'" style="display:block;border-radius:50%;flex-shrink:0">'
    +'<circle cx="'+cx+'" cy="'+cx+'" r="'+cx+'" fill="'+av.bg+'"/>'
    +'<ellipse cx="'+cx+'" cy="'+(s*.3)+'" rx="'+(s*.28)+'" ry="'+(s*.25)+'" fill="#333"/>'
    +'<ellipse cx="'+cx+'" cy="'+(s*.5)+'" rx="'+(s*.26)+'" ry="'+(s*.28)+'" fill="'+av.skin+'"/>'
    +'<circle cx="'+(cx-s*.16)+'" cy="'+(s*.43)+'" r="'+(s*.07)+'" fill="#fff"/>'
    +'<circle cx="'+(cx+s*.16)+'" cy="'+(s*.43)+'" r="'+(s*.07)+'" fill="#fff"/>'
    +'<circle cx="'+(cx-s*.16)+'" cy="'+(s*.43)+'" r="'+(s*.045)+'" fill="'+av.ec+'"/>'
    +'<circle cx="'+(cx+s*.16)+'" cy="'+(s*.43)+'" r="'+(s*.045)+'" fill="'+av.ec+'"/>'
    +'<path d="M'+(cx-s*.1)+' '+(s*.63)+' Q'+cx+' '+(s*.72)+' '+(cx+s*.1)+' '+(s*.63)+'" stroke="#CC7755" stroke-width="'+(s*.027)+'" fill="none" stroke-linecap="round"/>'
    +'</svg>';
}

// ── NOTIF ──────────────────────────────────────────────────────
var notifTimer=null;
function showNotif(icon,text,sub,color){
  var el=document.getElementById('notif');
  el.style.background=color||'#FF6B00';
  document.getElementById('notif-icon').textContent=icon;
  document.getElementById('notif-text').textContent=text;
  document.getElementById('notif-sub').textContent=sub||'';
  el.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer=setTimeout(function(){el.classList.remove('show');},3000);
}

// ── SFX ───────────────────────────────────────────────────────
var _ac=null;
function sfxCtx(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;}
function sfxNote(f,t,d,v,type){
  try{var c=sfxCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
  o.type=type||'sine';o.frequency.value=f;var s=c.currentTime+t;
  g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(v||.2,s+.015);
  g.gain.linearRampToValueAtTime(0,s+d);o.start(s);o.stop(s+d+.05);}catch(e){}}
function sfxTap(){sfxNote(880,0,.07,.2);sfxNote(1100,.05,.06,.12);}
function sfxCoin(){[880,1100,1320,1760].forEach(function(f,i){sfxNote(f,i*.055,.1,.22);});}
function sfxZap(){sfxNote(140,0,.05,.5,'sawtooth');sfxNote(300,.035,.05,.38,'square');}
function sfxWin(){var ns=[523,659,784,1047,1319,1568],t=0;ns.forEach(function(f){sfxNote(f,t,.15,.28,'triangle');t+=.12;});}

// ── NAVIGATION ────────────────────────────────────────────────
function showTab(id){
  if(id==='flash'){sfxZap();startChallenge();return;}
  sfxTap();
  state.currentTab=id;
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  var sc=document.getElementById('screen-'+id);
  if(sc){sc.classList.add('active');renderScreen(id);}
  document.querySelectorAll('.nb').forEach(function(b){
    b.classList.toggle('active',b.getAttribute('data-tab')===id);
  });
}

document.querySelectorAll('.nb').forEach(function(b){
  b.addEventListener('click',function(){showTab(b.getAttribute('data-tab'));});
});

// ── ONBOARDING ────────────────────────────────────────────────
var obStep=0,obLang='fr',obAvId='sakura';

// Build avatar grid
var grid=document.getElementById('ob-av-grid');
AVS.forEach(function(av){
  var d=document.createElement('div');
  d.className='av-item'+(av.id===obAvId?' sel':'');
  d.innerHTML=avSVG(av,52)+'<span style="font-size:10px;font-weight:800;color:'+(av.id===obAvId?'#FF6B00':'rgba(255,255,255,.5)')+'">'+av.name+'</span>';
  d.addEventListener('click',function(){
    sfxZap();obAvId=av.id;
    document.querySelectorAll('.av-item').forEach(function(x){x.classList.remove('sel');x.querySelector('span').style.color='rgba(255,255,255,.5)';});
    d.classList.add('sel');d.querySelector('span').style.color='#FF6B00';
    document.getElementById('ob-av-preview').innerHTML=avSVG(av,74);
  });
  grid.appendChild(d);
});
document.getElementById('ob-av-preview').innerHTML=avSVG(getAv(obAvId),74);

document.querySelectorAll('.lang-opt').forEach(function(el){
  el.addEventListener('click',function(){
    sfxTap();obLang=el.getAttribute('data-lang');
    document.querySelectorAll('.lang-opt').forEach(function(x){
      x.style.background='rgba(255,255,255,.08)';x.style.border='2px solid transparent';
      x.querySelector('span:last-child') && x.querySelector('span:last-child').remove && (x.innerHTML=x.innerHTML.replace('<span style="margin-left:auto;color:#FF6B00">✓</span>',''));
    });
    el.style.background='rgba(255,107,0,.2)';el.style.border='2px solid #FF6B00';
  });
});

function obNext(){
  sfxTap();
  document.getElementById('ob'+obStep).classList.remove('active');
  obStep++;
  document.getElementById('ob'+obStep).classList.add('active');
  // Update dots
  var dots=document.querySelectorAll('.dot');
  dots.forEach(function(d,i){
    if(i===obStep){d.style.width='24px';d.style.borderRadius='4px';d.style.background='#FF6B00';}
    else{d.style.width='8px';d.style.borderRadius='50%';d.style.background='rgba(255,255,255,.2)';}
  });
}

function obFinish(){
  sfxWin();
  var name=(document.getElementById('ob-name').value||'PLAYER').toUpperCase().slice(0,20);
  state.userName=name;state.avId=obAvId;state.lang=obLang;state.onboarded=true;
  localStorage.setItem('dz_name',name);localStorage.setItem('dz_av',obAvId);
  localStorage.setItem('dz_lang',obLang);localStorage.setItem('dz_done','1');
  document.getElementById('ob').style.display='none';
  renderScreen('home');
  showNotif('🎉','Bienvenue '+name+' !','DAREZ t\'attend ⚡','#FF6B00');
}

// ── RENDER SCREENS ────────────────────────────────────────────
function renderScreen(id){
  if(id==='home')renderHome();
  else if(id==='leagues')renderLeagues();
  else if(id==='global')renderGlobal();
  else if(id==='shop')renderShop();
  else if(id==='profile')renderProfile();
}

function renderHome(){
  var rank=getRank(ME.xp);
  var pct=((ME.xp-rank.min)/((rank.max===999999?ME.xp*1.5:rank.max)-rank.min))*100;
  var av=getAv(state.avId);
  var el=document.getElementById('screen-home');
  el.innerHTML='<div class="hero">'
    +'<div class="hero-orb" style="width:200px;height:200px;background:rgba(255,107,0,.2);top:-70px;right:-50px"></div>'
    +'<div style="display:flex;align-items:center;gap:13px;position:relative;z-index:2;margin-bottom:14px">'
      +avSVG(av,52)
      +'<div style="flex:1"><div style="font-family:\'Fredoka One\',sans-serif;font-size:22px;color:#fff">'+state.userName+'</div>'

function startChallenge(){

  var screen=document.getElementById('ch-screen');
  var content=document.getElementById('ch-content');
  screen.classList.add('active');
  var grad='linear-gradient(160deg,#FF6B00,#7C3AED)';
  var cdN=3;

  function showCD(){
    content.innerHTML='<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:'+grad+'">'
      +'<div style="font-family:\'Fredoka One\',sans-serif;font-size:18px;color:rgba(255,255,255,.7);letter-spacing:4px;margin-bottom:12px">PRÉPARE-TOI</div>'

    +'</div>';
    if(cdN>0){sfxTap();cdN--;chTimer=setTimeout(showCD,1000);}
    else{sfxZap();chTimer=setTimeout(showChallenge,600);}
  }

  function showChallenge(){
    var tLeft=ch.timer;
    function render(){
      var urg=tLeft<=5;
      content.innerHTML='<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:40px 24px;background:'+grad+'">'
        +'<div style="font-family:\'Fredoka One\',sans-serif;font-size:96px;color:'+(urg?'#FF3366':'#fff')+';line-height:1;'+(urg?'animation:pulse .5s infinite':'')+'" id="ch-timer">'+tLeft+'</div>'
        +'<div style="font-family:\'Fredoka One\',sans-serif;font-size:28px;color:#fff;text-align:center;line-height:1.3">'+ch.emoji+' '+ch.text+'</div>'
        +'<button onclick="clearInterval(chCountdown);showVote()" style="padding:16px 40px;border-radius:999px;background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.5);font-family:\'Fredoka One\',sans-serif;font-size:20px;color:#fff;cursor:pointer;margin-top:auto">TERMINÉ ✓</button>'
      +'</div>';
    }
    render();
    var chCountdown=setInterval(function(){
      tLeft--;
      var t=document.getElementById('ch-timer');
      if(t)t.textContent=tLeft;
      if(tLeft<=5&&tLeft>0){t&&(t.style.color='#FF3366');t&&(t.style.animation='pulse .5s infinite');}

        +'</div>';
      }).join('')
      +'<button onclick="endChallenge()" style="padding:14px;border-radius:999px;background:linear-gradient(135deg,#1E1B2E,#2D1B5E);color:#fff;border:none;font-family:\'Fredoka One\',sans-serif;font-size:17px;cursor:pointer">⚡ RETOUR</button>'
    +'</div>';
  }

  showCD();
}

function endChallenge(){
  sfxTap();
  clearTimeout(chTimer);
  document.getElementById('ch-screen').classList.remove('active');
  showNotif('🏆','+120 XP !','Score: '+ME.score,'#FF6B00');
}

// ── BOOT ──────────────────────────────────────────────────────
var bar=document.getElementById('splash-bar');
var sub=document.getElementById('splash-sub');
var pct=0;
var prog=setInterval(function(){
  pct=Math.min(pct+15,95);
  bar.style.width=pct+'%';
  sub.textContent=pct<50?'CHARGEMENT...':'DÉMARRAGE...';
},80);

window.addEventListener('load',function(){
  clearInterval(prog);
  bar.style.width='100%';
  sub.textContent='PRÊT !';

  setTimeout(function(){
    var splash=document.getElementById('splash');
    splash.style.transition='opacity .4s';
    splash.style.opacity='0';
    setTimeout(function(){splash.parentNode.removeChild(splash);},400);

    if(!state.onboarded){
      document.getElementById('ob').style.display='flex';
    } else {
      document.getElementById('ob').style.display='none';
      renderScreen('home');
    }
  },600);
});
</script>

</body>
</html>
