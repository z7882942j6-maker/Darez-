function useFlashState(){
  const[fs,setFs]=useState(()=>{
    const now=new Date(),h=now.getHours(),m=now.getMinutes();
    for(let i=0;i<FLASH_TIMES.length;i++){
      const ft=FLASH_TIMES[i],start=ft.h*60+ft.m,end=start+FLASH_DURATION_MIN,cur=h*60+m;
      if(cur>=start&&cur<end){const secs=(end-cur)*60-now.getSeconds();return{status:"live",index:i,secsRemaining:secs,next:0};}
    }
    const now2=h*60+m;
    for(let i=0;i<FLASH_TIMES.length;i++){const ft=FLASH_TIMES[i],start=ft.h*60+ft.m;if(start>now2){const secs=(start-now2)*60-now.getSeconds();return{status:"next",index:i,secsRemaining:0,next:secs};}}
    const tomorrow=FLASH_TIMES[0],secs=(tomorrow.h*60+tomorrow.m-(now2-1440))*60;
    return{status:"next",index:0,secsRemaining:0,next:Math.max(0,secs)};
  });
  useEffect(()=>{
    const id=setInterval(()=>{
      const now=new Date(),h=now.getHours(),m=now.getMinutes();
      for(let i=0;i<FLASH_TIMES.length;i++){
        const ft=FLASH_TIMES[i],start=ft.h*60+ft.m,end=start+FLASH_DURATION_MIN,cur=h*60+m;
        if(cur>=start&&cur<end){const secs=(end-cur)*60-now.getSeconds();setFs({status:"live",index:i,secsRemaining:secs,next:0});return;}
      }
      const now2=h*60+m;
      for(let i=0;i<FLASH_TIMES.length;i++){const ft=FLASH_TIMES[i],start=ft.h*60+ft.m;if(start>now2){const secs=(start-now2)*60-now.getSeconds();setFs({status:"next",index:i,secsRemaining:0,next:secs});return;}}
      setFs({status:"next",index:0,secsRemaining:0,next:0});
    },1000);
    return()=>clearInterval(id);
  },[]);
  return fs;
}
