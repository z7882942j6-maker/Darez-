<script type="text/plain" id="jsx-src">
const { useState, useEffect, useRef, useCallback } = React;


// ═══════════════════════════════════════════════════════════════
// DAREZ BACKEND — Multijoueur sans serveur
// Stockage local + sync via JSONBin (zéro inscription)
// ═══════════════════════════════════════════════════════════════

const BIN_API = "https://api.jsonbin.io/v3/b";
// Clé publique JSONBin demo — remplace par ta propre clé sur jsonbin.io (gratuit)
const BIN_KEY = "$2a$10$WFMHbdDLRqUHMJMbRZ4TdeWbFKBb5FJRQGfKPDXpVm7tT7pQvFS8C";

const LS = {
  get:(k,d=null)=>{ try{const v=localStorage.getItem("dz_"+k);return v?JSON.parse(v):d;}catch(e){return d;} },
  set:(k,v)=>{ try{localStorage.setItem("dz_"+k,JSON.stringify(v));}catch(e){} },
};

function getPlayerId(){ let id=LS.get("pid"); if(!id){id="p_"+Math.random().toString(36).slice(2,10);LS.set("pid",id);} return id; }

function emptyState(){ return {v:1,created:Date.now(),players:{},feed:[],leaderboard:[],leagues:{},lastFlash:{date:null,scores:{},votes:{}}}; }

async function binGet(id){
  try{ const r=await fetch(`${BIN_API}/${id}/latest`,{headers:{"X-Master-Key":BIN_KEY,"X-Bin-Meta":"false"}}); return r.ok?await r.json():null; }catch(e){return null;}
}
async function binCreate(data){
  try{ const r=await fetch(BIN_API,{method:"POST",headers:{"Content-Type":"application/json","X-Master-Key":BIN_KEY,"X-Bin-Name":"darez"},body:JSON.stringify(data)}); const d=await r.json(); return d.metadata?.id||null; }catch(e){return null;}
}
async function binUpdate(id,data){
  try{ const r=await fetch(`${BIN_API}/${id}`,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":BIN_KEY},body:JSON.stringify(data)}); return r.ok; }catch(e){return false;}
}

const DB = {
  binId: LS.get("bin_id"),
  state: null,
  listeners: [],
  _poll: null,
  _hash: "",

  async init(joinCode=null){
    if(joinCode){ this.binId=joinCode; LS.set("bin_id",joinCode); }
    if(this.binId){
      const data=await binGet(this.binId);
      if(data){ this.state=data; this._notify(); this._startPoll(); return {ok:true,isNew:false,binId:this.binId}; }
    }
    const s=emptyState();
    const id=await binCreate(s);
    if(id){ this.binId=id; LS.set("bin_id",id); this.state=s; this._notify(); this._startPoll(); return {ok:true,isNew:true,binId:id}; }
    this.state=LS.get("state")||emptyState(); this._notify(); return {ok:false,binId:null};
  },

  async save(){
    LS.set("state",this.state);
    if(this.binId) await binUpdate(this.binId,this.state);
    this._notify();
  },

  _startPoll(){
    if(this._poll)clearInterval(this._poll);
    this._poll=setInterval(async()=>{
      if(!this.binId)return;
      const data=await binGet(this.binId);
      if(!data)return;
      const hash=JSON.stringify(data).length+"_"+(data.feed?.length||0);
      if(hash!==this._hash){ this._hash=hash; this.state=data; this._notify(); }
    },5000);
  },

  _notify(){ this.listeners.forEach(fn=>fn(this.state)); },
  subscribe(fn){ this.listeners.push(fn); return ()=>{this.listeners=this.listeners.filter(l=>l!==fn);}; },

  async upsertPlayer(id,data){
    if(!this.state)return;
    this.state.players[id]={...(this.state.players[id]||{}),...data,updatedAt:Date.now()};
    this._rebuildLeaderboard();
    await this.save();
  },

  _rebuildLeaderboard(){
    this.state.leaderboard=Object.entries(this.state.players)
      .map(([id,p])=>({...p,id}))
      .sort((a,b)=>(b.xp||0)-(a.xp||0))
      .slice(0,50);
  },

  async submitScore(pid,score,xp,coins,challengeText,challengeEmoji){
    if(!this.state)return;
    const p=this.state.players[pid]||{};
    const today=new Date().toDateString();
    const yest=new Date(Date.now()-86400000).toDateString();
    const streak=p.lastPlayed===today?p.streak||1:p.lastPlayed===yest?(p.streak||0)+1:1;
    this.state.players[pid]={...p,xp:(p.xp||0)+xp,coins:(p.coins||0)+coins,streak,lastPlayed:today};
    if(!this.state.lastFlash.scores)this.state.lastFlash.scores={};
    this.state.lastFlash.scores[pid]=score;
    this.state.lastFlash.date=today;
    this.state.feed=([{pid,score,xp,time:Date.now(),name:p.name||"Player",avId:p.avId||"sakura",flag:p.flag||"🌍",chText:challengeText,chEmoji:challengeEmoji},...(this.state.feed||[])]).slice(0,30);
    this._rebuildLeaderboard();
    await this.save();
  },

  async submitVote(voterId,targetId){
    if(!this.state?.lastFlash)return;
    if(!this.state.lastFlash.votes)this.state.lastFlash.votes={};
    this.state.lastFlash.votes[voterId]=targetId;
    await this.save();
  },

  async createLeague(pid,name,badge,color){
    if(!this.state)return null;
    const id="lg_"+Math.random().toString(36).slice(2,8);
    this.state.leagues[id]={id,name,badge,color,ownerId:pid,members:[pid],weeklyXP:{[pid]:0},createdAt:Date.now()};
    await this.save(); return id;
  },

  async joinLeague(pid,lgId){
    if(!this.state?.leagues?.[lgId])return false;
    const lg=this.state.leagues[lgId];
    if(!lg.members.includes(pid))lg.members.push(pid);
    lg.weeklyXP=lg.weeklyXP||{}; lg.weeklyXP[pid]=lg.weeklyXP[pid]||0;
    await this.save(); return true;
  },

  getLeaderboard(){ return this.state?.leaderboard||[]; },
  getLeagues(){ return Object.values(this.state?.leagues||{}); },
  getFeed(){ return this.state?.feed||[]; },
  getPlayer(id){ return this.state?.players?.[id]||null; },
};

function useDB(){
  const [state,setState]=useState(()=>DB.state||emptyState());
  const [binId,setBinId]=useState(()=>DB.binId);
  const [ready,setReady]=useState(false);
  useEffect(()=>{
    const unsub=DB.subscribe(s=>{setState(s||emptyState());});
    const urlParams=new URLSearchParams(window.location.search);
    const joinCode=urlParams.get("join")||null;
    if(!DB.state||joinCode){
      DB.init(joinCode).then(({binId:id})=>{setBinId(id);setReady(true);});
    } else { setReady(true); }
    return unsub;
  },[]);
  return {state,binId,ready};
}

function getInviteLink(binId){
  if(!binId)return window.location.href;
  const url=new URL(window.location.href);
  url.searchParams.set("join",binId);
  return url.toString();
}

// ═══════════════════════ AUDIO JINGLES ═══════════════════════
const SFX = {
  _ctx: null,
  ctx() { if (!this._ctx) this._ctx = new (window.AudioContext || window.webkitAudioContext)(); return this._ctx; },
  n(f, t, d, v=0.28, type="sine") {
    try {
      const c=this.ctx(), o=c.createOscillator(), g=c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type=type; o.frequency.value=f;
      const s=c.currentTime+t;
      g.gain.setValueAtTime(0,s); g.gain.linearRampToValueAtTime(v,s+0.015);
      g.gain.setValueAtTime(v,s+d-0.04); g.gain.linearRampToValueAtTime(0,s+d);
      o.start(s); o.stop(s+d+0.05);
    } catch(e){}
  },
  tap()    { this.n(880,0,0.07,0.2); this.n(1100,0.05,0.06,0.12); },
  boing()  { [780,560,480,680,920].forEach((f,i)=>this.n(f,i*0.045,0.08,0.18,"sine")); },
  // 8-note ascending victory fanfare
  victory(){ const ns=[523,659,784,1047,784,1047,1319,1568],ds=[.12,.1,.1,.2,.08,.08,.1,.38]; let t=0; ns.forEach((f,i)=>{this.n(f,t,ds[i]+.05,.3,"triangle");t+=ds[i];}); },
  // Fire crescendo with harmonics
  streakFire(){ [262,330,392,523,659,784,1047].forEach((f,i)=>{this.n(f,i*.07,.2,.2);this.n(f*1.5,i*.07,.18,.1);}); this.n(1568,.6,.45,.32,"triangle"); },
  whoosh()  { try{ const c=this.ctx(),o=c.createOscillator(),g=c.createGain(),t=c.currentTime; o.connect(g);g.connect(c.destination);o.type="sine"; o.frequency.setValueAtTime(180,t);o.frequency.exponentialRampToValueAtTime(900,t+.15);o.frequency.exponentialRampToValueAtTime(140,t+.32); g.gain.setValueAtTime(.28,t);g.gain.linearRampToValueAtTime(0,t+.38); o.start(t);o.stop(t+.4); }catch(e){} },
  // Arcade coin sparkle

function InviteModal({visible,onClose,userName,avId,t,showNotif}) {
  const [copied,setCopied] = useState(false);
  const link = getInviteLink(DB.binId) || `https://darez.app/join?ref=${encodeURIComponent(userName)}`;

  const copy = async () => {
    SFX.coin();
    try { await navigator.clipboard.writeText(link); } catch(e) {}
    setCopied(true);
    showNotif({icon:"🔗",text:t.lg.invCopied,sub:t.lg.invCopiedSub,color:"var(--pu)"});
    setTimeout(()=>setCopied(false),2500);
  };

  const share = async () => {
    SFX.unlock();
    try {
      await navigator.share({
        title:"DAREZ — Flash Challenge",
        text:`${userName} t'invite sur DAREZ ⚡ — Le défi flash quotidien`,
        url: link
      });
    } catch(e) { copy(); }
  };

  if (!visible) return null;

function SeasonBanner({t}) {
  const [secs, setSecs] = useState(()=>{
    const now = new Date();
    // Season ends next Sunday 23:59
    const day = now.getDay();
    const daysUntilSunday = (7 - day) % 7 || 7;
    const sunday = new Date(now);
    sunday.setDate(now.getDate() + daysUntilSunday);
    sunday.setHours(23,59,0,0);
    return Math.floor((sunday - now) / 1000);
  });
  useEffect(()=>{
    const id = setInterval(()=>setSecs(s=>Math.max(0,s-1)),1000);
    return ()=>clearInterval(id);
  },[]);
  const d=Math.floor(secs/86400), h=Math.floor((secs%86400)/3600), m=Math.floor((secs%3600)/60);
  return (
    <div style={{margin:"12px 16px 0",background:"linear-gradient(135deg,#0F172A,#1E1B4B)",borderRadius:20,padding:"13px 16px",display:"flex",alignItems:"center",gap:12}}>

// ═══════════════════════ FLASH ALERT BANNER ═══════════════════════
// Urgency levels: 60min before → 10min → 2min → LIVE
function useFlashAlert(onStart) {
const fs = useFlashState();
const [dismissed, setDismissed] = useState({});
const alertRef = useRef(null);

const getAlert = () => {
if (fs.status === “live”) {
const key = `live_${fs.index}`;
if (dismissed[key]) return null;
return { key, level:“live”, secsLeft:fs.secsRemaining, onStart, onDismiss:()=>setDismissed(d=>({…d,[key]:true})) };
}
if (fs.next === null) return null;
const mins = Math.floor(fs.next / 60);
let level = null;
const key = `warn_${fs.index}_${mins < 10 ? "2" : mins < 60 ? "10" : "60"}`;
if (dismissed[key]) return null;
if (mins < 2) level = “urgent”;
else if (mins < 10) level = “soon”;
else if (mins < 62) level = “reminder”;
if (!level) return null;
return { key, level, minsLeft:mins, secsLeft:fs.next, onDismiss:()=>setDismissed(d=>({…d,[key]:true})) };
};

return getAlert();
}

{Array.from({length:Math.min(streak,7)}).map((_,i)=>(
<div key={i} style={{width:32,height:32,borderRadius:10,
