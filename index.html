<script type="text/babel" data-presets="react,env">
const { useState, useEffect, useRef, useCallback } = React;


// ═══════════════════════════════════════════════════════════════
// DAREZ BACKEND — Multijoueur sans serveur
// Stockage local + sync via JSONBin (zéro inscription)
// ═══════════════════════════════════════════════════════════════

const BIN_API = "https://api.jsonbin.io/v3/b";
// Clé publique JSONBin demo — remplace par ta propre clé sur jsonbin.io (gratuit)
const BIN_KEY = "$2a$10$WFMHbdDLRqUHMJMbRZ4TdeWbFKBb5FJRQGfKPDXpVm7tT7pQvFS8C";

const LS = {
  get:(k,d=null)=>{ try{const v=localStorage.getItem("dz_"+k);return v?JSON.parse(v):d;}catch(e){return d;} },
  set:(k,v)=>{ try{localStorage.setItem("dz_"+k,JSON.stringify(v));}catch(e){} },
};

function getPlayerId(){ let id=LS.get("pid"); if(!id){id="p_"+Math.random().toString(36).slice(2,10);LS.set("pid",id);} return id; }

function emptyState(){ return {v:1,created:Date.now(),players:{},feed:[],leaderboard:[],leagues:{},lastFlash:{date:null,scores:{},votes:{}}}; }

async function binGet(id){
  try{ const r=await fetch(`${BIN_API}/${id}/latest`,{headers:{"X-Master-Key":BIN_KEY,"X-Bin-Meta":"false"}}); return r.ok?await r.json():null; }catch(e){return null;}
}
async function binCreate(data){
  try{ const r=await fetch(BIN_API,{method:"POST",headers:{"Content-Type":"application/json","X-Master-Key":BIN_KEY,"X-Bin-Name":"darez"},body:JSON.stringify(data)}); const d=await r.json(); return d.metadata?.id||null; }catch(e){return null;}
}
async function binUpdate(id,data){
  try{ const r=await fetch(`${BIN_API}/${id}`,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":BIN_KEY},body:JSON.stringify(data)}); return r.ok; }catch(e){return false;}
}

const DB = {
  binId: LS.get("bin_id"),
  state: null,
  listeners: [],
  _poll: null,
  _hash: "",

  async init(joinCode=null){
    if(joinCode){ this.binId=joinCode; LS.set("bin_id",joinCode); }
    if(this.binId){
      const data=await binGet(this.binId);
      if(data){ this.state=data; this._notify(); this._startPoll(); return {ok:true,isNew:false,binId:this.binId}; }
    }
    const s=emptyState();
    const id=await binCreate(s);
    if(id){ this.binId=id; LS.set("bin_id",id); this.state=s; this._notify(); this._startPoll(); return {ok:true,isNew:true,binId:id}; }
    this.state=LS.get("state")||emptyState(); this._notify(); return {ok:false,binId:null};
  },

  async save(){
    LS.set("state",this.state);
    if(this.binId) await binUpdate(this.binId,this.state);
    this._notify();
  },

  _startPoll(){
    if(this._poll)clearInterval(this._poll);
    this._poll=setInterval(async()=>{
      if(!this.binId)return;
      const data=await binGet(this.binId);
      if(!data)return;
      const hash=JSON.stringify(data).length+"_"+(data.feed?.length||0);
      if(hash!==this._hash){ this._hash=hash; this.state=data; this._notify(); }
    },5000);
  },

  _notify(){ this.listeners.forEach(fn=>fn(this.state)); },
  subscribe(fn){ this.listeners.push(fn); return ()=>{this.listeners=this.listeners.filter(l=>l!==fn);}; },

  async upsertPlayer(id,data){
    if(!this.state)return;
    this.state.players[id]={...(this.state.players[id]||{}),...data,updatedAt:Date.now()};
    this._rebuildLeaderboard();
    await this.save();
  },

  _rebuildLeaderboard(){
    this.state.leaderboard=Object.entries(this.state.players)
      .map(([id,p])=>({...p,id}))
      .sort((a,b)=>(b.xp||0)-(a.xp||0))
      .slice(0,50);
  },

  async submitScore(pid,score,xp,coins,challengeText,challengeEmoji){
    if(!this.state)return;
    const p=this.state.players[pid]||{};
    const today=new Date().toDateString();
    const yest=new Date(Date.now()-86400000).toDateString();
    const streak=p.lastPlayed===today?p.streak||1:p.lastPlayed===yest?(p.streak||0)+1:1;
    this.state.players[pid]={...p,xp:(p.xp||0)+xp,coins:(p.coins||0)+coins,streak,lastPlayed:today};
    if(!this.state.lastFlash.scores)this.state.lastFlash.scores={};
    this.state.lastFlash.scores[pid]=score;
    this.state.lastFlash.date=today;
    this.state.feed=([{pid,score,xp,time:Date.now(),name:p.name||"Player",avId:p.avId||"sakura",flag:p.flag||"🌍",chText:challengeText,chEmoji:challengeEmoji},...(this.state.feed||[])]).slice(0,30);
    this._rebuildLeaderboard();
    await this.save();
  },

  async submitVote(voterId,targetId){
    if(!this.state?.lastFlash)return;
    if(!this.state.lastFlash.votes)this.state.lastFlash.votes={};
    this.state.lastFlash.votes[voterId]=targetId;
    await this.save();
  },

  async createLeague(pid,name,badge,color){
    if(!this.state)return null;
    const id="lg_"+Math.random().toString(36).slice(2,8);
    this.state.leagues[id]={id,name,badge,color,ownerId:pid,members:[pid],weeklyXP:{[pid]:0},createdAt:Date.now()};
    await this.save(); return id;
  },

  async joinLeague(pid,lgId){
    if(!this.state?.leagues?.[lgId])return false;
    const lg=this.state.leagues[lgId];
    if(!lg.members.includes(pid))lg.members.push(pid);
    lg.weeklyXP=lg.weeklyXP||{}; lg.weeklyXP[pid]=lg.weeklyXP[pid]||0;
    await this.save(); return true;
  },

  getLeaderboard(){ return this.state?.leaderboard||[]; },
  getLeagues(){ return Object.values(this.state?.leagues||{}); },
  getFeed(){ return this.state?.feed||[]; },
  getPlayer(id){ return this.state?.players?.[id]||null; },
};

function useDB(){
  const [state,setState]=useState(()=>DB.state||emptyState());
  const [binId,setBinId]=useState(()=>DB.binId);
  const [ready,setReady]=useState(false);
  useEffect(()=>{
    const unsub=DB.subscribe(s=>{setState(s||emptyState());});
    const urlParams=new URLSearchParams(window.location.search);
    const joinCode=urlParams.get("join")||null;
    if(!DB.state||joinCode){
      DB.init(joinCode).then(({binId:id})=>{setBinId(id);setReady(true);});
    } else { setReady(true); }
    return unsub;
  },[]);
  return {state,binId,ready};
}

function getInviteLink(binId){
  if(!binId)return window.location.href;
  const url=new URL(window.location.href);
  url.searchParams.set("join",binId);
  return url.toString();
}

// ═══════════════════════ AUDIO JINGLES ═══════════════════════
const SFX = {
  _ctx: null,
  ctx() { if (!this._ctx) this._ctx = new (window.AudioContext || window.webkitAudioContext)(); return this._ctx; },
  n(f, t, d, v=0.28, type="sine") {
    try {
      const c=this.ctx(), o=c.createOscillator(), g=c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type=type; o.frequency.value=f;
      const s=c.currentTime+t;
      g.gain.setValueAtTime(0,s); g.gain.linearRampToValueAtTime(v,s+0.015);
      g.gain.setValueAtTime(v,s+d-0.04); g.gain.linearRampToValueAtTime(0,s+d);
      o.start(s); o.stop(s+d+0.05);
    } catch(e){}
  },
  tap()    { this.n(880,0,0.07,0.2); this.n(1100,0.05,0.06,0.12); },
  boing()  { [780,560,480,680,920].forEach((f,i)=>this.n(f,i*0.045,0.08,0.18,"sine")); },
  // 8-note ascending victory fanfare
  victory(){ const ns=[523,659,784,1047,784,1047,1319,1568],ds=[.12,.1,.1,.2,.08,.08,.1,.38]; let t=0; ns.forEach((f,i)=>{this.n(f,t,ds[i]+.05,.3,"triangle");t+=ds[i];}); },
  // Fire crescendo with harmonics
  streakFire(){ [262,330,392,523,659,784,1047].forEach((f,i)=>{this.n(f,i*.07,.2,.2);this.n(f*1.5,i*.07,.18,.1);}); this.n(1568,.6,.45,.32,"triangle"); },
  whoosh()  { try{ const c=this.ctx(),o=c.createOscillator(),g=c.createGain(),t=c.currentTime; o.connect(g);g.connect(c.destination);o.type="sine"; o.frequency.setValueAtTime(180,t);o.frequency.exponentialRampToValueAtTime(900,t+.15);o.frequency.exponentialRampToValueAtTime(140,t+.32); g.gain.setValueAtTime(.28,t);g.gain.linearRampToValueAtTime(0,t+.38); o.start(t);o.stop(t+.4); }catch(e){} },
  // Arcade coin sparkle
  coin()   { [880,1100,1320,1760].forEach((f,i)=>this.n(f,i*.055,.1,.22)); },
  // Triumphant chord unlock
  unlock() { [[523,659,784],[659,784,1047]].forEach(([a,b,c],t)=>{this.n(a,t*.22,.32,.22,"triangle");this.n(b,t*.22,.32,.18,"triangle");this.n(c,t*.22,.32,.14,"triangle");}); this.n(1047,.48,.42,.3,"triangle"); },
  // Electric zap
  zap()    { this.n(140,0,.05,.5,"sawtooth"); this.n(300,.035,.05,.38,"square"); this.n(600,.07,.09,.2,"sine"); },
  // Sad trombone fail
  fail()   { [466,415,370,311].forEach((f,i)=>this.n(f,i*.1,.15,.3,"sawtooth")); },
  // Dun-dun-DUN vote lock
  voteLock(){ this.n(392,0,.16,.32,"triangle"); this.n(392,.2,.16,.32,"triangle"); this.n(523,.42,.42,.42,"triangle"); },
  // Countdown tick
  tick(n)  { if(n>0){this.n(660,0,.09,.38,"square");this.n(880,.045,.06,.22,"sine");}else{[523,784,1047,1319].forEach((f,i)=>this.n(f,i*.07,.18,.32,"triangle"));} },
  // Urgent danger beep
  danger() { this.n(880,0,.06,.42,"square"); this.n(1100,.07,.05,.3,"square"); },
};

// ═══════════════════════ SVG AVATARS ═══════════════════════
const AVS = [

function AvatarSVG({av, size=52}) {
  const s=size, cx=s/2, eyeY=s*.43, eyeX=s*.16, eyeRx=s*.085, eyeRy=s*.105, pupR=s*.054;
  const skinY=s*.5, skinRx=s*.26, skinRy=s*.28, hairY=s*.3;
  const mouths = {
    smile: <path d={`M${cx-s*.12} ${s*.63} Q${cx} ${s*.72} ${cx+s*.12} ${s*.63}`} stroke="#CC7755" strokeWidth={s*.027} fill="none" strokeLinecap="round"/>,
    grin:  <path d={`M${cx-s*.15} ${s*.61} Q${cx} ${s*.75} ${cx+s*.15} ${s*.61}`} stroke="#CC7755" strokeWidth={s*.028} fill="none" strokeLinecap="round"/>,
    smirk: <path d={`M${cx-s*.1} ${s*.64} Q${cx+s*.07} ${s*.69} ${cx+s*.14} ${s*.61}`} stroke="#CC7755" strokeWidth={s*.026} fill="none" strokeLinecap="round"/>,
    cute:  <><path d={`M${cx-s*.1} ${s*.63} Q${cx} ${s*.71} ${cx+s*.1} ${s*.63}`} stroke="#F48FB1" strokeWidth={s*.025} fill="none" strokeLinecap="round"/><circle cx={cx-s*.14} cy={s*.66} r={s*.04} fill="#F48FB1" opacity=".65"/><circle cx={cx+s*.14} cy={s*.66} r={s*.04} fill="#F48FB1" opacity=".65"/></>,
    sharp: <path d={`M${cx-s*.14} ${s*.63} L${cx-s*.06} ${s*.68} L${cx} ${s*.63} L${cx+s*.06} ${s*.68} L${cx+s*.14} ${s*.63}`} stroke="#CC7755" strokeWidth={s*.024} fill="none" strokeLinecap="round" strokeLinejoin="round"/>,
    roar:  <ellipse cx={cx} cy={s*.65} rx={s*.11} ry={s*.075} fill="#B71C1C"/>,
    evil:  <path d={`M${cx-s*.12} ${s*.64} Q${cx} ${s*.59} ${cx+s*.12} ${s*.64}`} stroke="#880E4F" strokeWidth={s*.028} fill="none" strokeLinecap="round"/>,
    bot:   <rect x={cx-s*.1} y={s*.61} width={s*.2} height={s*.08} rx={s*.025} fill="#00E5FF" opacity=".9"/>,
  };
  const accs = {
    mask:        <rect x={cx-s*.24} y={s*.49} width={s*.48} height={s*.17} rx={s*.07} fill="#111" opacity=".88"/>,
    flames:      [s*.28,s*.42,s*.56].map((x,i)=><path key={i} d={`M${x} ${s*.22} C${x-s*.06} ${s*.1} ${x+s*.06} ${s*.06} ${x+s*.04} ${s*.14} C${x+s*.08} ${s*.04} ${x+s*.12} ${s*.1} ${x+s*.06} ${s*.18}`} fill="#FF6D00" opacity=".85"/>),
    ice:         <><path d={`M${cx-s*.18} ${s*.16} L${cx} ${s*.05} L${cx+s*.18} ${s*.16}`} stroke="#80D8FF" strokeWidth={s*.025} fill="none"/><circle cx={cx} cy={s*.04} r={s*.04} fill="#80D8FF"/></>,
    ears:        <><ellipse cx={cx-s*.27} cy={s*.18} rx={s*.1} ry={s*.13} fill="#4A4E69"/><ellipse cx={cx+s*.27} cy={s*.18} rx={s*.1} ry={s*.13} fill="#4A4E69"/><ellipse cx={cx-s*.27} cy={s*.18} rx={s*.06} ry={s*.08} fill="#CFD0D4" opacity=".5"/><ellipse cx={cx+s*.27} cy={s*.18} rx={s*.06} ry={s*.08} fill="#CFD0D4" opacity=".5"/></>,
    flowers:     [cx-s*.18,cx,cx+s*.18].map((x,i)=><circle key={i} cx={x} cy={s*.1+i%2*s*.04} r={s*.055} fill={i===1?"#E91E63":"#F48FB1"}/>),
    bolt:        <path d={`M${cx+s*.08} ${s*.06} L${cx-s*.04} ${s*.24} L${cx+s*.05} ${s*.24} L${cx-s*.08} ${s*.4} L${cx+s*.18} ${s*.2} L${cx+s*.06} ${s*.2} Z`} fill="#FDD835"/>,
    stars:       [[cx-s*.28,s*.12],[cx+s*.28,s*.1],[cx,s*.04],[cx+s*.22,s*.22]].map(([x,y],i)=><polygon key={i} points={`${x},${y-s*.05} ${x+s*.03},${y} ${x+s*.06},${y} ${x+s*.03},${y+s*.03} ${x+s*.04},${y+s*.07} ${x},${y+s*.04} ${x-s*.04},${y+s*.07} ${x-s*.03},${y+s*.03} ${x-s*.06},${y} ${x-s*.03},${y}`} fill="#CE93D8"/>),
    horns:       <><path d={`M${cx-s*.22} ${s*.22} L${cx-s*.28} ${s*.05} L${cx-s*.12} ${s*.18}`} fill="#00695C"/><path d={`M${cx+s*.22} ${s*.22} L${cx+s*.28} ${s*.05} L${cx+s*.12} ${s*.18}`} fill="#00695C"/></>,
    panda_ears:  <><circle cx={cx-s*.28} cy={s*.18} r={s*.1} fill="#212121"/><circle cx={cx+s*.28} cy={s*.18} r={s*.1} fill="#212121"/></>,
    demon_horns: <><path d={`M${cx-s*.22} ${s*.22} L${cx-s*.26} ${s*.04} L${cx-s*.1} ${s*.19}`} fill="#FF1744"/><path d={`M${cx+s*.22} ${s*.22} L${cx+s*.26} ${s*.04} L${cx+s*.1} ${s*.19}`} fill="#FF1744"/></>,
    waves:       <path d={`M${cx-s*.28} ${s*.25} Q${cx-s*.14} ${s*.16} ${cx} ${s*.25} Q${cx+s*.14} ${s*.34} ${cx+s*.28} ${s*.25}`} stroke="#00E5FF" strokeWidth={s*.025} fill="none" strokeLinecap="round"/>,
    spikes:      [cx-s*.2,cx-s*.06,cx+s*.06,cx+s*.2].map((x,i)=><path key={i} d={`M${x} ${s*.23} L${x+s*.05} ${s*.05} L${x+s*.1} ${s*.23}`} fill="#E040FB"/>),
    fox_ears:    <><path d={`M${cx-s*.26} ${s*.22} L${cx-s*.32} ${s*.04} L${cx-s*.14} ${s*.18}`} fill="#BF360C"/><path d={`M${cx+s*.26} ${s*.22} L${cx+s*.32} ${s*.04} L${cx+s*.14} ${s*.18}`} fill="#BF360C"/><path d={`M${cx-s*.26} ${s*.21} L${cx-s*.3} ${s*.09} L${cx-s*.16} ${s*.18}`} fill="#FFD4A3"/><path d={`M${cx+s*.26} ${s*.21} L${cx+s*.3} ${s*.09} L${cx+s*.16} ${s*.18}`} fill="#FFD4A3"/></>,
    galaxy:      [...Array(6)].map((_,i)=><circle key={i} cx={cx-s*.25+i*s*.1} cy={s*.09+Math.sin(i*1.2)*s*.06} r={s*.025} fill={["#EA80FC","#80D8FF","#FFD740","#FF6D6D","#80FF80","#CE93D8"][i]}/>),
    mane:        <ellipse cx={cx} cy={s*.42} rx={s*.34} ry={s*.31} fill="#F57F17" opacity=".75"/>,
    antenna:     <><line x1={cx} y1={s*.06} x2={cx} y2={s*.18} stroke="#37474F" strokeWidth={s*.04}/><circle cx={cx} cy={s*.04} r={s*.06} fill="#00E5FF"/></>,
    hat:         <><path d={`M${cx-s*.28} ${s*.28} L${cx-s*.14} ${s*.06} L${cx+s*.14} ${s*.06} L${cx+s*.28} ${s*.28}`} fill="#4A148C"/><rect x={cx-s*.3} y={s*.26} width={s*.6} height={s*.08} rx={s*.04} fill="#6A1B9A"/></>,
    halo:        <ellipse cx={cx} cy={s*.09} rx={s*.17} ry={s*.045} fill="none" stroke="#FFD54F" strokeWidth={s*.038}/>,
    hood:        <path d={`M${cx-s*.36} ${s*.28} Q${cx-s*.2} ${s*.03} ${cx} ${s*.05} Q${cx+s*.2} ${s*.03} ${cx+s*.36} ${s*.28}`} fill="#0A0A0A" opacity=".94"/>,
    stripes:     null,
  };
  const acc = accs[av.ac];
  return (
    <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`} style={{display:"block",borderRadius:"50%",flexShrink:0}}>
      <circle cx={cx} cy={cx} r={cx} fill={av.bg}/>
      {av.ac==="mane" && acc}
      <ellipse cx={cx} cy={hairY} rx={s*.28} ry={s*.25} fill={av.hair}/>
      <ellipse cx={cx} cy={skinY} rx={skinRx} ry={skinRy} fill={av.skin}/>
      <ellipse cx={cx-eyeX} cy={eyeY} rx={eyeRx} ry={eyeRy} fill="#fff"/>
      <ellipse cx={cx+eyeX} cy={eyeY} rx={eyeRx} ry={eyeRy} fill="#fff"/>
      <circle cx={cx-eyeX} cy={eyeY} r={pupR} fill={av.ec}/>
      <circle cx={cx+eyeX} cy={eyeY} r={pupR} fill={av.ec}/>
      <circle cx={cx-eyeX+pupR*.5} cy={eyeY-pupR*.5} r={pupR*.36} fill="#fff" opacity=".92"/>
      <circle cx={cx+eyeX+pupR*.5} cy={eyeY-pupR*.5} r={pupR*.36} fill="#fff" opacity=".92"/>
      {mouths[av.mt]||null}
      {av.ac!=="mane" && acc}
    </svg>
  );
}

// ═══ PARTICLES ═══
function Particles({trigger}) {
const ref=useRef(null);
useEffect(()=>{
if(!trigger)return;
const canvas=ref.current;if(!canvas)return;
const ctx=canvas.getContext(“2d”);
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
const cols=[”#FF6B00”,”#FBBF24”,”#38BDF8”,”#34D399”,”#C084FC”,”#FB923C”];
let P=Array.from({length:90},()=>({
x:canvas.width/2+(Math.random()-.5)*280,y:canvas.height*.38,
vx:(Math.random()-.5)*15,vy:Math.random()*-14-5,
c:cols[Math.floor(Math.random()*cols.length)],
sz:Math.random()*9+4,rot:Math.random()*360,rs:(Math.random()-.5)*12,
a:1,g:.5,sh:[“c”,“s”,“r”][Math.floor(Math.random()*3)],
}));
let raf;
const draw=()=>{
ctx.clearRect(0,0,canvas.width,canvas.height);
P=P.filter(p=>p.a>.015);
P.forEach(p=>{
p.x+=p.vx;p.vy+=p.g;p.y+=p.vy;p.vx*=.97;p.rot+=p.rs;p.a-=.016;
ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
ctx.globalAlpha=p.a;ctx.fillStyle=p.c;
if(p.sh===“c”){ctx.beginPath();ctx.arc(0,0,p.sz/2,0,Math.PI*2);ctx.fill();}
else if(p.sh===“s”){ctx.beginPath();for(let i=0;i<5;i++){const a=(i*4*Math.PI/5)-Math.PI/2;const r=i%2===0?p.sz/2:p.sz/4;i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}ctx.closePath();ctx.fill();}
else{ctx.fillRect(-p.sz/2,-p.sz/4,p.sz,p.sz/2);}
ctx.restore();
});
if(P.length>0)raf=requestAnimationFrame(draw);
};
raf=requestAnimationFrame(draw);
return()=>cancelAnimationFrame(raf);
},[trigger]);
return <canvas ref={ref} style={{position:“fixed”,inset:0,pointerEvents:“none”,zIndex:200,width:“100%”,height:“100%”}}/>;
}

// ═══════════════════════ FLASH ENGINE ═══════════════════════
// Flash times: 08:30, 17:30, 21:00 — duration 5 min each
const FLASH_TIMES = [{h:8,m:30},{h:17,m:30},{h:21,m:0}];
const FLASH_DURATION_MIN = 5;

function getFlashState() {
const now = new Date();
const todayMins = now.getHours()*60 + now.getMinutes();
const secs = now.getSeconds();

for (let i = 0; i < FLASH_TIMES.length; i++) {
const ft = FLASH_TIMES[i];
const startMin = ft.h*60 + ft.m;
const endMin = startMin + FLASH_DURATION_MIN;
if (todayMins >= startMin && todayMins < endMin) {
const secsRemaining = (endMin - todayMins)*60 - secs;
return { status:“live”, index:i, secsRemaining, next:null };
}
}
// Find next flash
for (let i = 0; i < FLASH_TIMES.length; i++) {
const ft = FLASH_TIMES[i];
const startMin = ft.h*60 + ft.m;
if (todayMins < startMin) {
const secsUntil = (startMin - todayMins)*60 - secs;
return { status:“waiting”, index:i, secsRemaining:null, next:secsUntil };
}
}
// Next is tomorrow 08:30
const midnight = 24*60 - todayMins;
const secsUntil = midnight*60 - secs + 8*3600 + 30*60;
return { status:“waiting”, index:0, secsRemaining:null, next:secsUntil };
}

function fmtCountdown(secs) {
if (secs === null || secs === undefined) return “–:–”;
const h = Math.floor(secs/3600);
const m = Math.floor((secs%3600)/60);
const s = secs%60;
if (h > 0) return `${h}h${String(m).padStart(2,"0")}`;
return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}

function useFlashState() {
const [fs, setFs] = useState(getFlashState);
useEffect(() => {
const id = setInterval(() => setFs(getFlashState()), 1000);
return () => clearInterval(id);
}, []);
return fs;
}

function SeasonBanner({t}) {
const [secs, setSecs] = useState(()=>{
const now = new Date();
// Season ends next Sunday 23:59
const day = now.getDay();
const daysUntilSunday = (7 - day) % 7 || 7;
const sunday = new Date(now);
sunday.setDate(now.getDate() + daysUntilSunday);
sunday.setHours(23,59,0,0);
return Math.floor((sunday - now) / 1000);
});
useEffect(()=>{
const id = setInterval(()=>setSecs(s=>Math.max(0,s-1)),1000);
return ()=>clearInterval(id);

// Urgency levels: 60min before → 10min → 2min → LIVE
function useFlashAlert(onStart) {
const fs = useFlashState();
const [dismissed, setDismissed] = useState({});
const alertRef = useRef(null);

const getAlert = () => {
if (fs.status === “live”) {
const key = `live_${fs.index}`;
if (dismissed[key]) return null;
return { key, level:“live”, secsLeft:fs.secsRemaining, onStart, onDismiss:()=>setDismissed(d=>({…d,[key]:true})) };
}
if (fs.next === null) return null;
const mins = Math.floor(fs.next / 60);
let level = null;
const key = `warn_${fs.index}_${mins < 10 ? "2" : mins < 60 ? "10" : "60"}`;
if (dismissed[key]) return null;
if (mins < 2) level = “urgent”;
else if (mins < 10) level = “soon”;
else if (mins < 62) level = “reminder”;
if (!level) return null;
return { key, level, minsLeft:mins, secsLeft:fs.next, onDismiss:()=>setDismissed(d=>({…d,[key]:true})) };
};

return getAlert();
}

} else {

}
