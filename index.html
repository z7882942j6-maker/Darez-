function useFlashState() {
var init = function() {
var now=new Date(),h=now.getHours(),m=now.getMinutes(),cur=h*60+m;
for(var i=0;i<FLASH_TIMES.length;i++){
var ft=FLASH_TIMES[i],start=ft.h*60+ft.m,end=start+FLASH_DURATION_MIN;
if(cur>=start&&cur<end){return{status:‘live’,index:i,secsRemaining:(end-cur)*60-now.getSeconds(),next:0};}
}
for(var j=0;j<FLASH_TIMES.length;j++){
var ft2=FLASH_TIMES[j],s2=ft2.h*60+ft2.m;
if(s2>cur){return{status:‘next’,index:j,secsRemaining:0,next:(s2-cur)*60-now.getSeconds()};}
}
return{status:‘next’,index:0,secsRemaining:0,next:3600};
};
var r = useState(init);
var fs = r[0], setFs = r[1];
useEffect(function(){
var id=setInterval(function(){
var now=new Date(),h=now.getHours(),m=now.getMinutes(),cur=h*60+m;
for(var i=0;i<FLASH_TIMES.length;i++){
var ft=FLASH_TIMES[i],start=ft.h*60+ft.m,end=start+FLASH_DURATION_MIN;
if(cur>=start&&cur<end){setFs({status:‘live’,index:i,secsRemaining:(end-cur)*60-now.getSeconds(),next:0});return;}
}
for(var j=0;j<FLASH_TIMES.length;j++){
var ft2=FLASH_TIMES[j],s2=ft2.h*60+ft2.m;
if(s2>cur){setFs({status:‘next’,index:j,secsRemaining:0,next:(s2-cur)*60-now.getSeconds()});return;}
}
setFs({status:‘next’,index:0,secsRemaining:0,next:3600});
},1000);
return function(){clearInterval(id);};
},[]);
return fs;
}

h(‘div’,{style:{background:‘linear-gradient(160deg,#4C1D95,#7C3AED)’,padding:‘24px 18px 20px’,borderRadius:‘0 0 32px 32px’}},
h(‘div’,{style:{fontFamily:”‘Fredoka One’,sans-serif”,fontSize:28,color:’#fff’}},‘DAREZ ARSENAL’),
h(‘div’,{style:{display:‘inline-flex’,alignItems:‘center’,gap:8,marginTop:14,background:‘rgba(251,191,36,.2)’,borderRadius:999,padding:‘8px 16px’}},
h(‘span’,{style:{fontSize:20}},‘🪙’),
h(‘span’,{style:{fontFamily:”‘Fredoka One’,sans-serif”,fontSize:26,color:’#FBBF24’}},coins.toLocaleString())
)
),
h(‘div’,{style:{padding:‘14px 16px 0’}},
PENALTIES.map(function(p,i){return h(‘div’,{key:p.id,onClick:function(){if(p.cost>coins){SFX.fail();showNotif({icon:‘💸’,text:‘Pas assez !’,color:’#FF6B00’});return;}SFX.coin();setCoins(function(c){return c-p.cost;});showNotif({icon:p.emoji,text:pnames[i]+’ activé !’,color:’#34D399’});},style:{display:‘flex’,alignItems:‘center’,gap:12,background:’#fff’,borderRadius:18,padding:‘13px 14px’,marginBottom:10,cursor:‘pointer’,boxShadow:‘0 2px 10px rgba(0,0,0,.06)’}},
h(‘div’,{style:{width:46,height:46,borderRadius:14,background:‘linear-gradient(135deg,#FF6B00,#C084FC)’,display:‘grid’,placeItems:‘center’,fontSize:20,flexShrink:0}},p.emoji),
h(‘div’,{style:{flex:1}},h(‘div’,{style:{fontWeight:900,fontSize:14}},pnames[i])),
h(‘div’,{style:{fontFamily:”‘Fredoka One’,sans-serif”,fontSize:20,color:’#FF6B00’}},‘🪙’+p.cost)
);})
)
);
}

// ─── PROFILE SCREEN ────────────────────────────────────────────

var t=props.t,userAvId=props.userAvId,userName=props.userName,streak=props.streak,lang=props.lang,setLang=props.setLang;
var rank=getRank(ME.xp);
var pct=((ME.xp-rank.min)/((rank.max===999999?ME.xp*1.5:rank.max)-rank.min))*100;
var r=useState(false); var showLangPicker=r[0],setShowLangPicker=r[1];
return h(‘div’,{style:{overflowY:‘auto’,height:‘100%’}},
h(‘div’,{style:{background:‘linear-gradient(160deg,’+rank.g1+’,’+rank.g2+’)’,padding:‘28px 18px 22px’,textAlign:‘center’,position:‘relative’,overflow:‘hidden’}},
h(‘button’,{onClick:function(){setShowLangPicker(true);},style:{position:‘absolute’,top:16,right:16,background:‘rgba(255,255,255,.25)’,backdropFilter:‘blur(4px)’,border:‘none’,borderRadius:999,padding:‘6px 12px’,fontSize:13,cursor:‘pointer’,color:’#fff’,fontWeight:800}},LANGS[lang].flag+’ ‘+LANGS[lang].label),
h(AvatarSVG,{av:getAv(userAvId),size:86}),
h(‘div’,{style:{fontFamily:”‘Fredoka One’,sans-serif”,fontSize:28,color:’#fff’,marginTop:10}},userName),
h(‘div’,{style:{display:‘inline-flex’,background:‘rgba(255,255,255,.22)’,borderRadius:999,padding:‘5px 16px’,fontWeight:900,fontSize:13,color:’#fff’,marginTop:8}},rank.icon+’ ‘+rank.label),
h(‘div’,{style:{marginTop:14}},
h(‘div’,{style:{height:10,background:‘rgba(255,255,255,.18)’,borderRadius:5,overflow:‘hidden’}},
h(‘div’,{style:{height:‘100%’,width:pct+’%’,background:‘rgba(255,255,255,.8)’,borderRadius:5,animation:‘xpFill .9s ease-out’}})
),
h(‘div’,{style:{fontSize:10,fontWeight:800,color:‘rgba(255,255,255,.6)’,marginTop:4}},ME.xp.toLocaleString()+’ XP’)
)
),
h(‘div’,{style:{display:‘flex’,margin:‘14px 16px’,background:’#fff’,borderRadius:20,boxShadow:‘0 4px 20px rgba(0,0,0,.07)’,overflow:‘hidden’}},
[{v:streak+‘🔥’,l:‘Série’},{v:‘🪙’+ME.coins,l:‘Pièces’},{v:ME.score.toLocaleString(),l:‘Score’},{v:’#2’,l:‘Ligue’}].map(function(s,i){return h(‘div’,{key:i,style:{flex:1,padding:‘14px 4px’,textAlign:‘center’,borderRight:i<3?‘1px solid rgba(0,0,0,.06)’:‘none’}},
h(‘div’,{style:{fontFamily:”‘Fredoka One’,sans-serif”,fontSize:20,color:’#FF6B00’}},s.v),
h(‘div’,{style:{fontSize:9,fontWeight:900,color:’#94A3B8’,letterSpacing:.5,marginTop:3}},s.l)
);})
),
h(‘div’,{style:{padding:‘0 16px 20px’}},
h(‘div’,{style:{fontFamily:”‘Fredoka One’,sans-serif”,fontSize:16,color:’#94A3B8’,marginBottom:10}},‘PROGRESSION’),
RANKS.map(function(r2,i){
var unlocked=ME.xp>=r2.min,curr=r2.id===rank.id;
return h(‘div’,{key:r2.id,style:{display:‘flex’,gap:12,alignItems:‘center’,marginBottom:8,opacity:unlocked?1:.3}},
h(‘div’,{style:{width:40,height:40,borderRadius:12,background:unlocked?‘linear-gradient(135deg,’+r2.g1+’,’+r2.g2+’)’:’#eee’,display:‘grid’,placeItems:‘center’,fontSize:18,flexShrink:0,boxShadow:curr?‘0 4px 14px ‘+r2.color+‘55’:‘none’}},r2.icon),
h(‘div’,{style:{flex:1}},
h(‘div’,{style:{fontFamily:”‘Fredoka One’,sans-serif”,fontSize:15}},r2.label+(curr?’ ◀’:’’)),
h(‘div’,{style:{fontSize:10,fontWeight:800,color:’#94A3B8’,marginTop:1}},r2.min.toLocaleString()+’+ XP’)
),
unlocked&&h(‘span’,{style:{color:r2.color,fontSize:16}},‘✓’)
);
})
),
showLangPicker&&h(‘div’,{style:{position:‘fixed’,inset:0,background:‘rgba(15,12,35,.85)’,zIndex:900,display:‘flex’,alignItems:‘flex-end’},onClick:function(){setShowLangPicker(false);}},
h(‘div’,{onClick:function(e){e.stopPropagation();},style:{background:’#fff’,borderRadius:‘28px 28px 0 0’,padding:‘24px 20px 48px’,width:‘100%’,maxWidth:430,margin:‘0 auto’,animation:‘slideUp .32s ease-out’}},
Object.entries(LANGS).map(function(entry){var code=entry[0],l=entry[1];return h(‘div’,{key:code,onClick:function(){SFX.tap();setLang(code);setShowLangPicker(false);},style:{display:‘flex’,alignItems:‘center’,gap:14,padding:‘14px 16px’,borderRadius:16,background:lang===code?‘linear-gradient(135deg,#FF6B00,#C084FC)’:‘rgba(0,0,0,.03)’,marginBottom:8,cursor:‘pointer’}},

);})
)
)
);
}

// ─── MAIN APP ──────────────────────────────────────────────────
function App() {
var r1=useState(function(){return !!LS.get(‘onboarded’);}); var onboarded=r1[0],setOnboarded=r1[1];
var r2=useState(function(){return LS.get(‘lang’,‘fr’);}); var lang=r2[0],setLang=r2[1];
var r3=useState(function(){return LS.get(‘username’,‘PLAYER’);}); var userName=r3[0],setUserName=r3[1];
var r4=useState(function(){return LS.get(‘avid’,‘sakura’);}); var userAvId=r4[0],setUserAvId=r4[1];
var r5=useState(‘home’); var tab=r5[0],setTab=r5[1];
var r6=useState(false); var inChallenge=r6[0],setInChallenge=r6[1];
var r7=useState(null); var notif=r7[0],setNotif=r7[1];
var r8=useState(0); var confetti=r8[0],setConfetti=r8[1];
var nTimer=useRef(null);
var t=LANGS[lang];
var streak=9;

useEffect(function(){LS.set(‘lang’,lang);},[lang]);

var showNotif=useCallback(function(n){
setNotif(n);clearTimeout(nTimer.current);
nTimer.current=setTimeout(function(){setNotif(null);},3000);
},[]);

var navItems=[
{id:‘home’,icon:‘🏠’,label:t.nav.feed},
{id:‘leagues’,icon:‘⚔️’,label:t.nav.leagues},
{id:‘flash’,icon:‘⚡’,label:t.nav.flash},
{id:‘global’,icon:‘🌍’,label:‘Global’},
{id:‘profile’,icon:‘👤’,label:t.nav.stats}
];

if(!onboarded) return h(Onboarding,{lang:lang,setLang:function(l){setLang(l);LS.set(‘lang’,l);},t:t,onComplete:function(data){
var uname=(data.name||‘PLAYER’).toUpperCase();
setUserName(uname);setUserAvId(data.avId);
LS.set(‘username’,uname);LS.set(‘avid’,data.avId);LS.set(‘onboarded’,true);
setOnboarded(true);SFX.victory();setConfetti(function(c){return c+1;});
}});

return h(‘div’,{style:{width:‘100%’,height:‘100%’,display:‘flex’,flexDirection:‘column’,background:’#F1F5F9’,overflow:‘hidden’}},
h(Particles,{trigger:confetti}),
h(Notif,{n:notif}),
// Content
inChallenge
?h(ChallengeFlow,{t:t,onDone:function(data){setInChallenge(false);setTab(‘home’);setConfetti(function(c){return c+1;});showNotif({icon:‘🏆’,text:’+’+data.xp+’ XP !’,sub:‘Score: ‘+data.score,color:’#FF6B00’});},showNotif:showNotif})
:h(‘div’,{style:{flex:1,overflow:‘hidden’,display:‘flex’,flexDirection:‘column’}},
// Ticker
h(‘div’,{style:{background:‘rgba(255,107,0,.12)’,padding:‘7px 16px’,fontSize:11,fontWeight:800,color:’#FF6B00’,letterSpacing:.5,flexShrink:0}},‘🔥 48K joueurs en live · ⚡ Flash dans 2h · 👑 zara_flash vient d'atteindre GOD’),
// Screen
h(‘div’,{style:{flex:1,overflow:‘hidden’}},
tab===‘home’&&h(HomeScreen,{t:t,onStart:function(){SFX.zap();setInChallenge(true);},showNotif:showNotif,userName:userName,userAvId:userAvId,streak:streak}),
tab===‘leagues’&&h(LeaguesScreen,{t:t,showNotif:showNotif}),
tab===‘global’&&h(GlobalScreen,{t:t}),
tab===‘shop’&&h(ShopScreen,{t:t,showNotif:showNotif}),
tab===‘profile’&&h(ProfileScreen,{t:t,userAvId:userAvId,userName:userName,streak:streak,lang:lang,setLang:function(l){setLang(l);LS.set(‘lang’,l);}})
)
),
// Nav
!inChallenge&&h(‘nav’,{style:{display:‘flex’,background:’#fff’,borderTop:‘1px solid rgba(0,0,0,.07)’,paddingBottom:‘env(safe-area-inset-bottom)’,flexShrink:0}},
navItems.map(function(item){
var active=tab===item.id&&!inChallenge;
return h(‘button’,{key:item.id,onClick:function(){if(item.id===‘flash’){SFX.zap();setInChallenge(true);setTab(‘flash’);}else{SFX.tap();setTab(item.id);}},style:{flex:1,display:‘flex’,flexDirection:‘column’,alignItems:‘center’,gap:3,padding:‘10px 4px’,border:‘none’,background:‘none’,cursor:‘pointer’}},
h(‘span’,{style:{fontSize:22,transform:active?‘scale(1.18)’:‘scale(1)’,transition:‘transform .15s’,filter:item.id===‘flash’?‘drop-shadow(0 0 6px #FBBF24)’:‘none’}},item.icon),
h(‘span’,{style:{fontSize:9,fontWeight:800,color:active?’#FF6B00’:’#94A3B8’,letterSpacing:.3,fontFamily:”‘Nunito’,sans-serif”}},item.label)
);
})
)
);
}

// Boot
function boot() {
if(typeof React === ‘undefined’ || typeof ReactDOM === ‘undefined’) {
setTimeout(boot, 50); return;
}
var sub=document.getElementById(‘ss’), fill=document.getElementById(‘sb’);
var pct=0;
var prog=setInterval(function(){
pct=Math.min(pct+12,95);
if(fill)fill.style.width=pct+’%’;
if(sub)sub.textContent=pct<50?‘CHARGEMENT…’:‘DÉMARRAGE…’;
},60);
setTimeout(function(){
clearInterval(prog);
if(fill)fill.style.width=‘100%’;
try {
ReactDOM.createRoot(document.getElementById(‘root’)).render(React.createElement(App));
setTimeout(function(){
var s=document.getElementById(‘splash’);
if(s){s.classList.add(‘out’);setTimeout(function(){if(s.parentNode)s.parentNode.removeChild(s);},500);}
},300);
} catch(e) {
if(sub){sub.textContent=‘ERR: ‘+e.message.slice(0,40);sub.style.color=’#FF6B6B’;}
console.error(’[DAREZ]’, e);
}
},800);
}
window.addEventListener(‘load’, boot);
</script>
