function useFlashState(){
  const[fs,setFs]=useState(()=>{
    const now=new Date(),h=now.getHours(),m=now.getMinutes();
    for(let i=0;i<FLASH_TIMES.length;i++){const ft=FLASH_TIMES[i],start=ft.h*60+ft.m,end=start+FLASH_DURATION_MIN,cur=h*60+m;if(cur>=start&&cur<end){const secs=(end-cur)*60-now.getSeconds();return{status:"live",index:i,secsRemaining:secs,next:0};}}
    const now2=h*60+m;
    for(let i=0;i<FLASH_TIMES.length;i++){const ft=FLASH_TIMES[i],start=ft.h*60+ft.m;if(start>now2){const secs=(start-now2)*60-now.getSeconds();return{status:"next",index:i,secsRemaining:0,next:secs};}}
    return{status:"next",index:0,secsRemaining:0,next:3600};
  });
  useEffect(()=>{
    const id=setInterval(()=>{
      const now=new Date(),h=now.getHours(),m=now.getMinutes();
      for(let i=0;i<FLASH_TIMES.length;i++){const ft=FLASH_TIMES[i],start=ft.h*60+ft.m,end=start+FLASH_DURATION_MIN,cur=h*60+m;if(cur>=start&&cur<end){const secs=(end-cur)*60-now.getSeconds();setFs({status:"live",index:i,secsRemaining:secs,next:0});return;}}
      const now2=h*60+m;
      for(let i=0;i<FLASH_TIMES.length;i++){const ft=FLASH_TIMES[i],start=ft.h*60+ft.m;if(start>now2){const secs=(start-now2)*60-now.getSeconds();setFs({status:"next",index:i,secsRemaining:0,next:secs});return;}}
      setFs({status:"next",index:0,secsRemaining:0,next:0});
    },1000);
    return()=>clearInterval(id);
  },[]);
  return fs;
}

  const[sub,setSub]=useState(null);
  const[selLeague,setSelLeague]=useState(null);
  const[notif,setNotif]=useState(null);
  const[showStreak,setShowStreak]=useState(false);
  const[showLang,setShowLang]=useState(false);
  const[confetti,setConfetti]=useState(0);
  const streak=9;
  const nTimer=useRef(null);
  const showNotif=useCallback((n)=>{setNotif(n);clearTimeout(nTimer.current);nTimer.current=setTimeout(()=>setNotif(null),3000);},[]);
  const navItems=[{id:"home",icon:"🏠",badge:2},{id:"leagues",icon:"⚔️",badge:1},{id:"flash",icon:"⚡",badge:null},{id:"global",icon:"🌍",badge:null},{id:"shop",icon:"🛒",badge:null}];
  const handleNav=(id)=>{if(id==="flash"){SFX.zap();setSub("challenge");setTab("flash");return;}SFX.tap();setTab(id);setSub(null);};
  const navLabels={home:t.nav.feed,leagues:t.nav.leagues,flash:t.nav.flash,global:t.nav.stats||"Stats",shop:t.nav.shop};
  const M=React.createElement;

  if(!onboarded)return M(React.Fragment,null,
    M("style",null,CSS),
    M(Onboarding,{lang,setLang,t,onComplete:({name,avId})=>{
      const uname=name.toUpperCase()||"PLAYER";
      setUserName(uname);setUserAvId(avId);
      LS.set("username",uname);LS.set("avid",avId);LS.set("onboarded",true);
      setOnboarded(true);SFX.victory();setConfetti(c=>c+1);
      setTimeout(()=>setShowStreak(true),900);
    }}),
    M(Particles,{trigger:confetti})
  );

  const inCh=sub==="challenge";
  return M(React.Fragment,null,
    M("style",null,CSS),
    M("div",{className:"app"},
      M(Particles,{trigger:confetti}),
      M(Notif,{notif}),
      showStreak&&M(StreakModal,{streak,t,onClose:()=>setShowStreak(false)}),
      showLang&&M(LangSheet,{lang,setLang,onClose:()=>setShowLang(false)}),
      !inCh&&M("div",{style:{background:"#1E1B2E",padding:"7px 16px",height:30,display:"flex",alignItems:"center"}},
        M("div",{style:{fontFamily:"'Fredoka One',sans-serif",fontSize:11,color:"rgba(255,255,255,.6)",whiteSpace:"nowrap"}},"⚡ zara_flash scored 9,200 pts! 🔥 drift.exe on 7-day streak! 👑 neon_leo reached BLAZE!")
      ),
      inCh
        ?M(ChallengeFlow,{onDone:(data)=>{setSub(null);setTab("home");},showNotif,t,userAvId,userName})
        :sub==="create_league"
          ?M("div",{className:"scroll",style:{flex:1}},M(CreateLeague,{onBack:()=>setSub(null),showNotif,t}))
          :sub==="league_detail"
            ?M("div",{className:"scroll",style:{flex:1}},M(LeagueDetail,{league:selLeague,onBack:()=>setSub(null),showNotif,t}))
            :M("div",{className:"scroll",style:{flex:1}},
              tab==="home"&&M(HomeScreen,{onStart:()=>{SFX.zap();setSub("challenge");},showNotif,t,userAvId,userName,streak,onStreakClick:()=>setShowStreak(true),showLS:()=>setShowLang(true)}),
              tab==="leagues"&&M(LeaguesScreen,{showNotif,onDetail:l=>{setSelLeague(l);setSub("league_detail");},onCreate:()=>setSub("create_league"),t}),
              tab==="flash"&&M(HomeScreen,{onStart:()=>setSub("challenge"),showNotif,t,userAvId,userName,streak,onStreakClick:()=>setShowStreak(true),showLS:()=>setShowLang(true)}),
              tab==="global"&&M(GlobalScreen,{t,userName}),
              tab==="shop"&&M(ShopScreen,{showNotif,t})
            ),
      !inCh&&M("nav",{className:"nav"},
        ...navItems.map(item=>M("button",{key:item.id,className:"nb "+(tab===item.id&&!sub?"active":""),onClick:()=>handleNav(item.id),style:{position:"relative"}},
          item.badge&&tab!==item.id&&M("div",{className:"nbadge"},item.badge),
          M("span",{className:"ni",style:item.id==="flash"?{filter:"drop-shadow(0 0 6px #FBBF24)"}:{}},item.icon),
          M("span",{className:"nl",style:item.id==="flash"?{color:"#FBBF24"}:{}},navLabels[item.id])
        ))
      )
    )
  );
}

// Launch
window.__stopProg();
setTimeout(()=>{
  try{
    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
    window.hideSplash();
  }catch(e){
    const sub=document.getElementById("ss");
    if(sub){sub.textContent=e.message.slice(0,80);sub.style.color="#FF6B6B";}
    setTimeout(window.hideSplash,5000);
  }
},100);
</script>
</body>
</html>
