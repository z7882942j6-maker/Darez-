*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#1E1B2E;font-family:'Nunito',sans-serif;overscroll-behavior:none}
body{display:flex;justify-content:center}
#app{width:100%;max-width:430px;height:100%;display:flex;flex-direction:column;overflow:hidden;background:#F1F5F9;position:relative}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;flex-direction:column}
.screen.active{display:flex}
#main-nav{display:flex;background:#fff;border-top:1px solid rgba(0,0,0,.08);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;border:none;background:none;cursor:pointer}
.nb .ni{font-size:22px;transition:transform .2s}
.nb .nl{font-size:9px;font-weight:800;color:#94A3B8;letter-spacing:.3px;font-family:'Nunito',sans-serif}
.nb.active .ni{transform:scale(1.2)}
.nb.active .nl{color:#FF6B00}
#splash{position:fixed;inset:0;background:linear-gradient(160deg,#1E1B2E,#2D1B5E);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
#splash.out{opacity:0;pointer-events:none}
#notif{position:fixed;top:60px;left:50%;transform:translateX(-50%);border-radius:999px;padding:10px 22px;display:flex;align-items:center;gap:8px;z-index:9000;box-shadow:0 6px 24px rgba(0,0,0,.3);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .25s;max-width:92%}
#notif.show{opacity:1}
#overlay{position:fixed;inset:0;background:rgba(15,12,35,.88);z-index:8000;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
#overlay.show{display:flex}
#sheet{background:#fff;border-radius:28px 28px 0 0;padding:28px 20px 48px;width:100%;max-width:430px;animation:slideUp .32s ease-out;max-height:88vh;overflow-y:auto}
#ob{position:fixed;inset:0;background:linear-gradient(160deg,#1E1B2E,#2D1B5E);z-index:7000;display:none;flex-direction:column;align-items:center;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
#ob.show{display:flex}
.ob-step{display:none;flex-direction:column;align-items:center;flex:1;padding:20px 24px 40px;width:100%;overflow-y:auto}
.ob-step.show{display:flex}
#ch-wrap{position:fixed;inset:0;z-index:6000;display:none;flex-direction:column;background:#000}
#ch-wrap.show{display:flex}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes barFill{from{width:0}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade{animation:fadeUp .3s ease-out both}
.btn-grad{width:100%;padding:16px;border-radius:999px;background:linear-gradient(135deg,#FF6B00,#C084FC);border:none;font-family:'Fredoka One',sans-serif;font-size:19px;color:#fff;cursor:pointer;box-shadow:0 6px 24px rgba(255,107,0,.3)}
.btn-dark{width:100%;padding:14px;border-radius:999px;background:linear-gradient(135deg,#1E1B2E,#2D1B5E);border:none;font-family:'Fredoka One',sans-serif;font-size:17px;color:#fff;cursor:pointer}
.btn-ghost{width:100%;padding:14px;border-radius:999px;background:rgba(0,0,0,.06);border:none;font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;cursor:pointer;color:#94A3B8}
.card{background:#fff;border-radius:20px;box-shadow:0 2px 14px rgba(0,0,0,.07)}

// ═══════════════ SFX — FUNNY ════════════════════════════════════
var _ac=null;
function ac(){if(!_ac){try{_ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return _ac;}
function sn(f,t2,d,v,tp){
  try{var c=ac();if(!c)return;var o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);o.type=tp||'sine';o.frequency.value=f;
  var s=c.currentTime+t2;g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(v||.18,s+.015);
  g.gain.linearRampToValueAtTime(0,s+d);o.start(s);o.stop(s+d+.05);}catch(e){}}

// Minion laugh: wee-hee-hee
function sfxMinionLaugh(){
  [600,800,600,900,650,950].forEach(function(f,i){sn(f,i*.07,.1,.3,'sine');});
}
// Boing/cartoon jump
function sfxBoing(){
  var c=ac();if(!c)return;
  try{var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
  o.type='sine';var s=c.currentTime;
  o.frequency.setValueAtTime(150,s);o.frequency.exponentialRampToValueAtTime(800,s+.25);
  g.gain.setValueAtTime(.3,s);g.gain.linearRampToValueAtTime(0,s+.35);
  o.start(s);o.stop(s+.4);}catch(e){}}
// Womp womp (fail)
function sfxWomp(){
  [466,440,415,390,370,350].forEach(function(f,i){sn(f,i*.12,.2,.28,'sawtooth');});
}
// Pop coin
function sfxPop(){
  sn(1200,0,.04,.25,'sine');sn(800,.04,.06,.2,'sine');
}
// Power up ding
function sfxPowerUp(){
  [523,659,784,1047,1319].forEach(function(f,i){sn(f,i*.08,.12,.22,'triangle');});
}
// Fart (trombone) — for fun fail
function sfxFart(){
  var c=ac();if(!c)return;
  try{var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
  o.type='sawtooth';var s=c.currentTime;
  o.frequency.setValueAtTime(120,s);o.frequency.setValueAtTime(90,s+.05);o.frequency.setValueAtTime(70,s+.1);
  g.gain.setValueAtTime(.3,s);g.gain.linearRampToValueAtTime(0,s+.22);
  o.start(s);o.stop(s+.25);}catch(e){}}
// Victory fanfare
function sfxVictory(){
  var ns=[523,659,784,1047,784,1047,1319,1568],tt=0;
  ns.forEach(function(f,i){sn(f,tt,.13,.25,'triangle');tt+=(i===3?.2:.1);});
}
// Countdown tick
function sfxTick(){sn(880,0,.06,.2);sn(1100,.04,.05,.12);}
// Zap
function sfxZap(){sn(140,0,.05,.45,'sawtooth');sn(300,.035,.05,.35,'square');}
// Whoosh
function sfxWhoosh(){sn(200,0,.15,.18);sn(800,.15,.1,.08);}

var FT=[{h:8,m:30},{h:17,m:30},{h:21,m:0}];
function flashState(){
  var now=new Date(),cur=now.getHours()*60+now.getMinutes();
  for(var i=0;i<FT.length;i++){var s=FT[i].h*60+FT[i].m,e=s+30;if(cur>=s&&cur<e)return{live:true,idx:i,secs:(e-cur)*60-now.getSeconds()};}
  for(var j=0;j<FT.length;j++){var s2=FT[j].h*60+FT[j].m;if(s2>cur)return{live:false,idx:j,secs:(s2-cur)*60-now.getSeconds()};}
  return{live:false,idx:0,secs:3600};
}

    sorted.forEach(function(p,i){
      var row=document.createElement('div');row.style.cssText='display:flex;align-items:center;gap:11px;padding:11px 16px;background:#fff;border-radius:16px;animation:fadeUp .28s ease-out both;animation-delay:'+(i*.05)+'s';
      row.innerHTML='<div style="font-family:\'Fredoka One\',sans-serif;font-size:20px;width:28px;text-align:center">'+(i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1))+'</div>'+avSVG({skin:p.skin,hair:p.hair,bg:p.bg,acc:p.acc},36)+'<div style="flex:1;font-weight:900;font-size:13px">'+p.name+' '+p.flag+'</div><div style="font-family:\'Fredoka One\',sans-serif;font-size:17px;color:#FF6B00">'+p.score.toLocaleString()+'</div>';
      wrap.appendChild(row);
    });
    var sb=document.createElement('button');sb.className='btn-grad';sb.innerHTML='📤 PARTAGER MON SCORE';sb.addEventListener('click',function(){doShare(S.score,S.name);});wrap.appendChild(sb);
    var bb=document.createElement('button');bb.className='btn-dark';bb.textContent=t('back')+' ⚡';bb.addEventListener('click',endChallenge);wrap.appendChild(bb);
    inner.appendChild(wrap);
  }
  showCD();
}
function stopCam(){if(_cam){_cam.getTracks().forEach(function(t){t.stop();});_cam=null;}}
function endChallenge(){sfxWhoosh();stopCam();clearInterval(_chT);document.getElementById('ch-wrap').classList.remove('show');notif('🏆','+120 XP !','Score: '+S.score,'#FF6B00');}

// ═══════════════ SHARE ═══════════════════════════════════════════
function doShare(score,name){
  sfxPop();
  var url='https://z7882942j6-maker.github.io/Darez-';
  var txt=score?(name||S.name)+' vient de scorer '+score+' sur DAREZ ⚡ ! Rejoins la battle !':'Rejoins DAREZ — Le défi flash qui déchire 🔥 !';
  if(navigator.share){navigator.share({title:'DAREZ ⚡',text:txt,url:url}).catch(function(){});}
  else{try{navigator.clipboard.writeText(txt+'\n'+url);}catch(e){}notif('🔗','Lien copié !','Partage avec ta crew','#C084FC');}
}

// ═══════════════ BOOT ═════════════════════════════════════════════
var _bar=document.getElementById('sp-bar'),_sub=document.getElementById('sp-sub'),_p=0;
var _prog=setInterval(function(){_p=Math.min(_p+15,95);if(_bar)_bar.style.width=_p+'%';if(_sub)_sub.textContent=_p<50?'CHARGEMENT...':'DÉMARRAGE...';},80);
window.addEventListener('load',function(){
  clearInterval(_prog);if(_bar)_bar.style.width='100%';if(_sub)_sub.textContent='PRÊT ! ⚡';
  setTimeout(function(){
    var sp=document.getElementById('splash');
    if(sp){sp.classList.add('out');setTimeout(function(){if(sp.parentNode)sp.parentNode.removeChild(sp);},500);}
    updateNav();buildOB();
    if(!S.done){document.getElementById('ob').classList.add('show');}
    else{renderScreen('home');}
  },900);
});

})();
